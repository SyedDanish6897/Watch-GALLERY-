<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Watch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width:500px">
    <h3 class="mb-4">Edit Watch</h3>

    <form method="POST" enctype="multipart/form-data">

        <label class="form-label">Brand</label>
        <input name="brand" class="form-control mb-3" value="{{ watch.brand }}" required>

        <label class="form-label">Model</label>
        <input name="model" class="form-control mb-3" value="{{ watch.model }}" required>

        <label class="form-label">Price</label>
        <input name="price" class="form-control mb-3" value="{{ watch.price }}" required>

        <label class="form-label">Discount Price</label>
        <input name="discount_price" class="form-control mb-3" value="{{ watch.discount_price }}">

        <label class="form-label">Category</label>
        <input name="category" class="form-control mb-3" value="{{ watch.category }}" required>

        <label class="form-label">Description</label>
        <textarea name="description" class="form-control mb-3" rows="4">{{ watch.description }}</textarea>

        <label class="form-label">Change Image (optional)</label>
        <input type="file" name="image" class="form-control mb-3">

        <button class="btn btn-primary w-100">Update Watch</button>

    </form>

    <a href="/admin/dashboard" class="btn btn-secondary w-100 mt-3">Back</a>
</div>

</body>
</html>
