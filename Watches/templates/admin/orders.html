<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>📦 Orders</h2>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Invoice</th>
            <th>Buyer</th>
            <th>Email</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Invoice PDF</th>
        </tr>
    </thead>
    <tbody>
        {% for o in orders %}
        <tr>
            <td>{{ o.invoice_number }}</td>
            <td>{{ o.buyer_name }}</td>
            <td>{{ o.buyer_email }}</td>
            <td>₹{{ o.amount }}</td>
            <td>{{ o.date.strftime('%d-%m-%Y %H:%M') }}</td>
            <td>
                <a href="/admin/invoice/{{ o.id }}" class="btn btn-sm btn-primary">
                    Download
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/admin/dashboard" class="btn btn-secondary">⬅ Back</a>

</body>
</html>
