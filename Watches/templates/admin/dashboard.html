<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Watch Gallery – Admin</span>
    <div>
        <a href="/admin/add-watch" class="btn btn-sm btn-success">Add Watch</a>
        <a href="/admin/logout" class="btn btn-sm btn-danger ms-2">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h3>All Watches</h3>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Price</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for w in watches %}
            <tr>
                <td>{{ w.id }}</td>
                <td>{{ w.brand }}</td>
                <td>{{ w.model }}</td>
                <td>₹{{ w.price }}</td>
                <td>{{ w.category }}</td>
                <td>
                    <a href="/admin/edit-watch/{{ w.id }}" 
                        class="btn btn-sm btn-primary">
                        Edit
                    </a>
                    <a href="/admin/delete-watch/{{ w.id }}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this watch?')">
                       Delete
                    </a>
                    <a href="/admin/orders" class="btn btn-warning mb-3">
                        📦 View Orders
                    </a>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
