<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2>🛒 Your Cart</h2>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Watch</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cartBody"></tbody>
    </table>

    <h4 class="text-end">
        Grand Total: ₹<span id="grandTotal">0</span>
    </h4>

    <div class="text-end mt-3">
        <a href="/" class="btn btn-secondary">Continue Shopping</a>
        <button type="button"
            class="btn btn-success"
            onclick="checkout()">
            Checkout
        </button>

    </div>
</div>

<!-- ✅ PROFILE MODAL (REQUIRED) -->
<div class="modal fade" id="profileFormModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Complete Your Profile</h5>
            </div>
            <div class="modal-body">
                <form id="profileForm">
                    <input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name" required>
                    <input type="date" id="dob" class="form-control mb-2" required>
                    <textarea id="address" class="form-control mb-2" placeholder="Address" required></textarea>
                    <input type="tel" id="contactNo" class="form-control mb-2" placeholder="Mobile Number" required>
                    <button class="btn btn-success w-100">Save & Continue</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>


</body>
</html>
